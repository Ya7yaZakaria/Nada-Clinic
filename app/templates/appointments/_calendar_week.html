<div class="clinic-card">
    <div class="d-flex justify-content-between mb-3">
        <h2 class="h5 mb-0">Week view</h2>
        <span class="text-muted">{{ week_start }} → {{ week_end }}</span>
    </div>

    {% if appointments %}
        <div class="list-group list-group-flush">
            {% for appointment in appointments %}
                {% include "appointments/_appointment_card.html" %}
            {% endfor %}
        </div>
    {% else %}
        <p class="text-muted mb-0">No appointments in this week.</p>
    {% endif %}
</div>
