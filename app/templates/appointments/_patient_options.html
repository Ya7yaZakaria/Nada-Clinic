{% if patient_query %}
    {% if patients %}
        <div class="booking-patient-options">
            {% for candidate in patients %}
                <label class="booking-patient-option">
                    <input
                        class="form-check-input"
                        type="radio"
                        name="patient_id"
                        value="{{ candidate.id }}"
                        @change="selectedPatient = true"
                    >
                    <span class="booking-patient-avatar">
                        {{ PatientService.get_display_name(candidate)[:1]|upper }}
                    </span>
                    <span class="booking-patient-option-copy">
                        <strong>{{ PatientService.get_display_name(candidate) }}</strong>
                        <small>MRN {{ candidate.formatted_mrn }} · {{ candidate.phone_primary }}</small>
                    </span>
                    <i class="bi bi-check-circle-fill booking-patient-check" aria-hidden="true"></i>
                </label>
            {% endfor %}
        </div>
    {% else %}
        <div class="booking-empty-result">
            <i class="bi bi-person-x" aria-hidden="true"></i>
            <div>
                <strong>No matching patient</strong>
                <small>Check the spelling or register a new patient.</small>
            </div>
        </div>
    {% endif %}

    {% if can_create_patient %}
        <button
            class="booking-create-from-search"
            type="button"
            data-patient-query="{{ patient_query }}"
            @click="patientMode = 'new'; $nextTick(() => {
                let query = $el.dataset.patientQuery;
                let fieldId = /^[+0-9\s()-]+$/.test(query)
                    ? 'new_patient_phone_primary'
                    : (/[؀-ۿ]/.test(query)
                        ? 'new_patient_name_ar'
                        : 'new_patient_name_en');
                let field = document.getElementById(fieldId);
                if (field && !field.value) field.value = query;
                field?.focus();
            })"
        >
            <i class="bi bi-person-plus" aria-hidden="true"></i>
            <span>
                <strong>Create a new patient</strong>
                <small>Prefill “{{ patient_query }}” and complete the registration</small>
            </span>
            <i class="bi bi-arrow-right" aria-hidden="true"></i>
        </button>
    {% endif %}
{% endif %}
