<div
    class="modal fade"
    id="clinic-action-modal"
    tabindex="-1"
    aria-hidden="true"
    aria-labelledby="clinic-action-modal-title"
>
    <div
        class="modal-dialog modal-dialog-centered
               modal-dialog-scrollable"
    >
        <div
            class="modal-content"
            id="clinic-action-modal-content"
        >
            <div class="modal-header">
                <h2
                    class="modal-title fs-5"
                    id="clinic-action-modal-title"
                >
                    Clinic action
                </h2>

                <button
                    class="btn-close"
                    type="button"
                    data-bs-dismiss="modal"
                    aria-label="Close"
                ></button>
            </div>

            <div class="modal-body">
                <div class="clinic-modern-empty">
                    <span>
                        <i class="bi bi-window"></i>
                    </span>

                    <strong>No action selected</strong>

                    <p>
                        Select a quick action from Today Clinic.
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
