<div
    class="offcanvas offcanvas-end clinic-drilldown-drawer"
    tabindex="-1"
    id="clinic-drilldown-drawer"
    aria-labelledby="clinic-drilldown-title"
>
    <div class="offcanvas-header">
        <h2
            class="offcanvas-title fs-5"
            id="clinic-drilldown-title"
        >
            Clinic details
        </h2>

        <button
            class="btn-close"
            type="button"
            data-bs-dismiss="offcanvas"
            aria-label="Close"
        ></button>
    </div>

    <div
        class="offcanvas-body"
        id="clinic-drilldown-content"
        aria-live="polite"
        aria-busy="false"
    >
        <div class="clinic-modern-empty">
            <span>
                <i class="bi bi-layout-sidebar-inset-reverse"></i>
            </span>

            <strong>No details selected</strong>

            <p>
                Select a counter, alert, type, or Finance card.
            </p>
        </div>
    </div>
</div>
