<div class="clinic-card h-100">
    <div class="d-flex justify-content-between gap-2 mb-2">
        <div>
            <p class="section-kicker">Waiting Queue</p>
            <h2 class="h5">Arrived Patients</h2>
        </div>
        <span class="badge text-bg-primary">{{ clinic_day.waiting_queue|length }}</span>
    </div>

    {% if clinic_day.waiting_queue %}
        <div class="list-group list-group-flush">
            {% for appointment in clinic_day.waiting_queue %}
                {% include "clinic/_appointment_card.html" %}
            {% endfor %}
        </div>
    {% else %}
        <div class="placeholder-box">
            <p class="fw-semibold mb-1">No patients waiting.</p>
            <p class="text-muted mb-0">Arrived appointments will appear here.</p>
        </div>
    {% endif %}
</div>
